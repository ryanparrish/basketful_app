# TLS is terminated at the Linode NodeBalancer (Full Strict).
# Nginx only needs to handle plain HTTP on the private VLAN.
# The NodeBalancer forwards X-Forwarded-For; nginx adds X-Forwarded-Proto: https
# so Django's SECURE_SSL_REDIRECT does not loop.

server {
    listen 80;
    server_name _;

    # Django static files
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /var/www/media/;
    }

    # Health check
    location = /api/health/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django API — proxy to gunicorn
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CRITICAL: NodeBalancer terminates TLS; tell Django the original request
        # was HTTPS so SECURE_SSL_REDIRECT doesn't trigger a redirect loop.
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Admin frontend SPA — served at /new/admin/
    location /new/admin/ {
        alias /var/www/admin/;
        try_files $uri $uri/ /new/admin/index.html;
    }

    location = /new/admin/index.html {
        alias /var/www/admin/index.html;
    }

    # Root redirect to admin
    location = / {
        return 302 /new/admin/;
    }
}

