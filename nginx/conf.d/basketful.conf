# ------------------------------
# Main site: basketful.lovewm.org
# ------------------------------
# TLS is terminated at the Linode NodeBalancer (Full Strict).
# This nginx receives plain HTTP on port 80 from the private VLAN.
# $scheme is therefore always "http" here — we must hardcode "https"
# on the Django proxy so SECURE_SSL_REDIRECT doesn't loop.

server {
    listen 80;
    server_name basketful.lovewm.org;

    # Main reverse proxy to Gunicorn
    # X-Forwarded-Proto MUST be hardcoded https — $scheme would be "http"
    # (NodeBalancer→nginx is plain HTTP) and trigger an infinite redirect loop.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /new/admin {
        return 308 /new/admin/;
    }

    location ^~ /new/admin/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /new/cart/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

